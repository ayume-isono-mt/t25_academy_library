<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
    <script type="text/javascript" th:src="@{/js/book/add.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍登録</div>
                <div class="page_contents">

                    <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/add}" method="post">
                        
                        <div th:if="${errorMessage}" class="error-message" style="color: red;">
                            <p th:text="${errorMessage}"></p>
                        </div>
                        
                        <p>書籍名：<br>
                            <input type="text" th:field="*{title}" required />
                                </p>
                                <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color: red;"></div>
                        <p>ISBN：<br>
                            <input type="text" th:field="*{isbn}" required />
                     <div th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" style="color: red;"></div>

                     <input type="hidden" name="updatedAt"
                              value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" />
                     <span> 
                        <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>        
                    </span>

                     <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
                        <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>

             </div>    
           </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
